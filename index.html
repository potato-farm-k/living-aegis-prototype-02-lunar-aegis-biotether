<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020605">
  <title>Lunar Aegis: Bio-Tether Intercept</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="simulation-shell">
    <canvas id="gameCanvas" aria-label="Lunar Aegis interception simulation"></canvas>

    <div class="corner-controls" aria-label="Controls">
      <span><b>MOUSE</b> AIM</span>
      <span><b>LMB</b> FIRE</span>
      <span><b>SPACE</b> PULSE</span>
      <span><b>WHEEL / RMB</b> ZOOM</span>
      <span><b>T</b> SCAN</span>
      <button id="resetButton" type="button">R / RESET</button>
    </div>

    <section id="startCard" class="start-card">
      <p class="eyebrow">LUNA HUB 7-A // HELMET LINK</p>
      <h1>BIO-TETHER<br>INTERCEPT</h1>
      <p>지구 방어선으로 접근하는 적성 투사체를 요격하십시오.<br>에너지 흐름과 무기 열을 함께 관리해야 합니다.</p>
      <button id="startButton" type="button">NEURAL LINK ENGAGE</button>
      <small>클릭 후 마우스를 움직여 조준</small>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
